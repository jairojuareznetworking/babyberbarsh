<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BabyBerbarsh Oficial</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
            /* SE USA EL NOMBRE EXACTO CON LA EXTENSIÓN .jpeg */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('verbphoto.jpeg');
            background-size: 110% 110%;
            background-position: center;
            animation: moveBackground 15s ease-in-out infinite alternate;
        }

        @keyframes moveBackground {
            from { background-position: 0% 0%; }
            to { background-position: 100% 100%; }
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 50px;
            border-radius: 40px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            max-width: 85%;
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-gif {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 5px solid #e73c7e;
            object-fit: cover;
            margin-bottom: 25px;
            box-shadow: 0 0 30px #e73c7e;
            animation: glow 3s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 20px #e73c7e; }
            to { box-shadow: 0 0 40px #ff4d94, 0 0 10px #23d5ab; }
        }

        h1 { font-size: 2.5rem; margin: 0; color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        p { font-size: 1.1rem; color: #ccc; margin-top: 10px; }

        .countdown {
            font-size: 1.6rem;
            margin-top: 35px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #eee;
        }

        .timer {
            color: #23d5ab;
            display: block;
            font-size: 3rem;
            margin-top: 15px;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 15px rgba(35, 213, 171, 0.7);
        }
    </style>
</head>
<body>

    <div class="container">
        <video autoplay muted loop playsinline class="profile-gif">
            <source src="VerbsVideo.mp4" type="video/mp4">
            Tu navegador no soporta videos.
        </video>
        
        <h1>BabyBerbarsh</h1>
        <p>Cortarle las orejas a una mula no lo hace caballo / save the date</p>

        <div class="countdown">
            TIEMPO RESTANTE:
            <span id="timer" class="timer">Cargando...</span>
        </div>
    </div>

    <script>
        const targetDate = new Date();
        targetDate.setFullYear(targetDate.getFullYear() + 3);

        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.getElementById('timer').innerHTML = "¡Llegó el momento!";
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('timer').innerHTML = 
                `${days}d ${hours}h ${mins}m ${secs}s`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>

</body>
</html>
